name: CI

on:
  push:
    branches: [main, dev, "chore/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.6.9 black==24.10.0

      - name: Ruff
        run: ruff check .

      - name: Black --check
        run: black --check .

  test:
    name: Smoke + unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==8.3.3 pytest-cov==5.0.0

      - name: Import smoke test
        env:
          TROVLY_ENV: ci
        run: |
          python -c "import app_hosted, auth, applications, usage_limits, security, sources, sources_ats, matcher, tailor"

      - name: Pytest (if tests/ exists)
        run: |
          if [ -d tests ]; then pytest; else echo "no tests/ dir yet — skipping"; fi

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: trovly:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  secrets-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
